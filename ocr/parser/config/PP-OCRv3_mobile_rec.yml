Architecture:
  Backbone:
    last_conv_stride:
    - 1
    - 2
    name: MobileNetV1Enhance
    scale: 0.5
  Head:
    head_list:
    - CTCHead:
        Head:
          fc_decay: 1.0e-05
        Neck:
          depth: 2
          dims: 64
          hidden_dims: 120
          name: svtr
          use_guide: true
    - SARHead:
        enc_dim: 512
        max_text_length: 25
    name: MultiHead
  Transform: null
  algorithm: SVTR_LCNet
  model_type: rec
Eval:
  dataset:
    data_dir: /content/drive/MyDrive/OCR
    label_file_list:
    - /content/drive/MyDrive/OCR/train/train_txt_fixed.txt
    name: SimpleDataSet
    transforms:
    - DecodeImage:
        channel_first: false
        img_mode: BGR
    - MultiLabelEncode: null
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_sar
        - length
        - valid_ratio
  loader:
    batch_size_per_card: 4
    drop_last: false
    num_workers: 0
    shuffle: false
Global:
  cal_metric_during_train: true
  character_dict_path: /content/drive/MyDrive/OCR/PaddleOCR/ppocr/utils/dict/korean_dict.txt
  checkpoints: null
  distributed: false
  epoch_num: 50
  eval_batch_step:
  - 0
  - 500
  infer_img: doc/imgs_words/ch/word_1.jpg
  infer_mode: false
  log_smooth_window: 20
  max_text_length: 25
  pretrained_model: /content/drive/MyDrive/OCR/pretrained/korean_PP-OCRv3_rec_train/best_accuracy
  print_batch_step: 5
  save_epoch_step: 10
  save_inference_dir: null
  save_model_dir: /content/drive/MyDrive/OCR/output/rec_korean_fix
  use_gpu: false
  use_space_char: true
  use_visualdl: false
Loss:
  loss_config_list:
  - CTCLoss: null
  - SARLoss: null
  name: MultiLoss
Metric:
  ignore_space: false
  main_indicator: acc
  name: RecMetric
Optimizer:
  beta1: 0.9
  beta2: 0.999
  lr:
    learning_rate: 0.0005
    name: Cosine
    warmup_epoch: 2
  name: Adam
  regularizer:
    factor: 0.0001
    name: L2
PostProcess:
  name: CTCLabelDecode
Train:
  dataset:
    data_dir: /content/drive/MyDrive/OCR
    label_file_list:
    - /content/drive/MyDrive/OCR/train/train_txt_fixed.txt
    name: SimpleDataSet
    transforms:
    - DecodeImage:
        channel_first: false
        img_mode: BGR
    - RecAug: null
    - MultiLabelEncode: null
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_sar
        - length
        - valid_ratio
  loader:
    batch_size_per_card: 4
    drop_last: true
    num_workers: 0
    shuffle: true
